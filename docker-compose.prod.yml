# Production-style local / VPS deploy: docker compose -f docker-compose.prod.yml up -d --build
services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
    volumes:
      - chroma_data:/app/data/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  chroma_data:
