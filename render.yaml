# Render Blueprint — https://render.com/docs/blueprint-spec
# Note: Free tier has ~30s HTTP timeout; ingest may need Railway or paid Render.
services:
  - type: web
    name: reach-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CHROMA_PERSIST_DIR
        value: /app/data/chroma
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_MODEL_FALLBACKS
        value: gemini-1.5-flash,gemini-2.5-flash
      - key: AUTO_FALLBACK_OPENAI
        value: "true"
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
    # Persistent Chroma (requires paid Render instance):
    # disk:
    #   name: reach-chroma
    #   mountPath: /app/data/chroma
    #   sizeGB: 1
